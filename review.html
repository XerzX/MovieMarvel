<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Oswald:wght@500&display=swap" rel="stylesheet">

  <style>
     body {
      background-color: #0D1B2A;
      color: #FFD700;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .review-container {
      max-width: 600px;
      margin: 2rem auto;
      background: #1B263B;
      padding: 2rem;
      border-radius: 8px;
      
    }

    label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.3rem;
      border: 1px solid #FFD700;
      border-radius: 4px;
      background: #FFFFFF;
      color: #0D1B2A;
    }

    input[type="text"].movie-title {
  color: #0D1B2A;  
}


    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .submit-btn {
      margin-top: 1rem;
      background-color: #FFD700;
      border: none;
      padding: 0.7rem 1.5rem;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      color: #111;
      display: block;
      width: 100%;
    }

    .submit-btn:hover {
      background-color: #e6c200;
    }

    /* Top Nav Bar */
    .page-nav {
      background-color: #0A1F44;
      color: #FFD700;
      padding: 1rem 0.5rem;
      display: flex;
      justify-content: space-between; 
      align-items: center;
      gap: 1rem;
    }

    .nav-left {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .page-nav.shifted {
        margin-left: 240px;
        transition: margin-left 0.3s ease;
    }

    .page-nav h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.5rem;
      margin: 0;
    }

    .menu-toggle {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: #FFD700;
      cursor: pointer;
    }

    .side-menu {
      display: none;
  position: fixed;
  top: 0;
  left: -240px;       
  width: 240px;
  height: 100%;
  background-color: #0D1B2A;
  color: #fff;
  padding: 1rem;
  transition: left 0.3s ease;
  z-index: 1000;
}

.side-menu.open {
  left: 0;            
  
}

    .auth-actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .auth-actions button {
      background-color: #FFC857;
      border: none;
      padding: 0.5rem;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      color: #0A1F44;
    }

    .menu-links ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .menu-links li {
      margin-bottom: 1rem;
    }

    .menu-links a {
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .menu-links a:hover {
      text-decoration: underline;
    }
    
    .return-btn {
background: none;
  border: none;               
  color: #0A1F44;
  font-size: 1rem;
  cursor: pointer;
  font-weight: bold;
  margin: 0;                  
  padding: 0;                
  display: inline;   

}

.back-link {
  display: block;
  margin-top: 1rem;
  text-align: center;
  color: #00aaff;
  text-decoration: none;
  font-weight: bold;
}

.back-link:hover {
  text-decoration: underline;
}


  </style>
</head>
<body>
 <header>
         <!-- Nav Bar -->
  <nav class="page-nav">
        <div class="nav-left">
  <button class="menu-toggle" aria-label="Open menu">☰</button>
  <h1 class="logo">MovieMarvel</h1>
  </div>
    </header>

<!-- Sidebar menu -->
<aside class="side-menu" id="sideMenu">
  <div class="user-info">
    <img src="avatar.png" alt="User Avatar">
    <h4>Username</h4>
    <p>Account Type</p>
    <button class="logoutBtn">Logout</button>
  </div>

  <nav class="menu-links">
  <ul>
    <li><a href="browse.html">Browse Movies</a></li>
    <li><a href="profile.html">Profile</a></li>
    <li><a href="reviews.html">Reviews</a></li>
    <li><a href="recommendations.html">Recommendations</a></li>
    <li><a href="watchlist.html">Watchlist</a></li>
  </ul>
</nav>
</aside>

  <!-- Main content -->
  <main>
    <div class="review-container">
    <h1>Write a Review</h1>
    <form>
      <label for="movieTitle">Movie:</label>
      <input type="text" id="movieTitle" class="movie-title" readonly value="Current Movie Title">

      <label for="reviewText">Your Review:</label>
      <textarea id="reviewText" name="reviewText"></textarea>

      <button type="submit" class="submit-btn">Submit Review</button>
    </form>
    <a href="allreviews.html" class="back-link">View all my ratings</a>
  </div>

      <a href="browse.html" class="back-link">← Back to Movies</a>
    </section>
  </main>

  <script src="script.js"></script>

  <!--get title and put it in the form 
  Handle review submission
  send review to backend
  Create a new review item
  Reset form
  back link-->


</body>
</html>
