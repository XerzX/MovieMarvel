<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MovieMarvel- Sign Up</title>

        <style>
            body {
                font-family: 'Roboto', sans-serif;
                background-color: #121212;
                color: #FFFFFF;
                margin: 0;
                padding: 0;
            }

            h1,h3 {
                font-family: 'Oswald',sans-serif;
                color: #FFFFFF;
            }

            h2 {
                color: #0A1F44;
            }

            header {
                background-color: #0A1F44;
                padding: 1rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            button {
                background-color: #FFC857;
                color: #0A1F44;
                border: none;
                padding: 0.5rem 1rem;
                cursor: pointer;
                font-family: 'Roboto', sans-serif;
                font-weight: bold;
                border-radius: 25px;
            }

            #signupForm {
                background-color: #F9F9F9;
                color: #0A1F44;
                padding: 2rem;
                margin: 2rem auto;
                max-width: 400px;
                border-radius: 8px;
            }

            .hidden{
                display: none;
            }

            input {
                width: 100%;
                padding: 0.5rem;
                margin: 0.5rem 0 1rem;
                border: 1px solid #ECECEC;
                border-radius: 4px;
            }

            a {
                color: #1DB9F0;
                text-decoration: none;
            }

            a:hover {
                text-decoration: underline;
            }

            .success {
                color: #4CAF50;
            }

            .warning {
                color: #FFB704;
            }
            .error {
                color: #D90429;
            }

            #premiumPage {
                background-color: #0D1B2A;
                color: #FFD700;
                padding: 2rem;
                border-radius: 8px;
            }

        </style>
        </head>

        <body>
            <!--Navigation Bar-->
            <header>
                <h1>MovieMarvel</h1>
                <button id="signupBtn">Sign Up</button>
            </header>

            <!--Sign Up Form-->
            <section id="signupForm" class="hidden">
                <h2>Create Your Account</h2>
                <form>
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email">

                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">

                    <label>
                        <input type="checkbox" id="subscribe">
                        Subscribe to MovieMarvel premium
                    </label>

                    <p><a href="#" id="learnMore"> Unlock exclusive content and advanced recommendations.</a></p>

                    <button type="submit">Sign Up</button>
                </form>
            </section>

            <!--Subscription payment page-->
            <section id="paymentPage" class="hidden">
                <h2>Choose Payment Method</h2>
                <button>Link PayPal</button>
                <button>Pay with Credit Card</button>
            </section>

            <!--Premium featured page-->
            <section id="premiumPage" class="hidden">
                <h2>MovieMarvel Premium Features</h2>
                <ul>
                    <li>Exclusive Content Access</li>
                    <li>Advanced Recommendations</li>
                    <li>Enhanced Diary and Review Tools</li>
                    <li>Community and Social Features</li>
                    <li>Perks and Integrations</li>
                </ul>
            </section>
            <script src="script.js"></script>
        </body>
</html>
