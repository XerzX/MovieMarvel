<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MovieMarvel - Sign Up</title>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #121212;
      color: #FFFFFF;
      margin: 0;
      padding: 0;
    }

    h1,h3 {
      font-family: 'Oswald',sans-serif;
      color: #FFFFFF;
    }

    h2 {
      color: #0A1F44;
    }

    header {
      background-color: #0A1F44;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      background-color: #FFC857;
      color: #0A1F44;
      border: none;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-family: 'Roboto', sans-serif;
      font-weight: bold;
      border-radius: 25px;
    }

    #signupForm {
      background-color: #F9F9F9;
      color: #0A1F44;
      padding: 2rem;
      margin: 2rem auto;
      max-width: 400px;
      border-radius: 8px;
    }

    input {
      width: 100%;
      padding: 0.5rem;
      margin: 0.5rem 0 1rem;
      border: 1px solid #ECECEC;
      border-radius: 4px;
    }

    a {
      color: #1DB9F0;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .warning {
      color: #FFB704;
    }
    .error {
      color: #D90429;
    }

    #premiumPage {
      background-color: #0D1B2A;
      color: #FFD700;
      padding: 2rem;
      border-radius: 8px;
    }

    #premiumPage h2 {
      color: #FFD700;
      text-shadow: 1px 1px 3px #0A1F44;
    }
  </style>
</head>
<body>
  <header>
    <h1>MovieMarvel</h1>
    <button id="signupBtn">Sign Up</button>
  </header>

  <!-- Sign Up Form -->
  <section id="signupForm">
    <h2>Create Your Account</h2>
    <form>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email">

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password">

      <!-- Subscription choice -->
      <label>
        <input type="checkbox" id="subscribe">
        Subscribe to MovieMarvel premium
      </label>
      <button type="button" id="subscribeBtn">Subscribe</button>

      <!-- Payment options -->
      <div id="paymentPage">
        <h3>Choose Payment Method</h3>
        <button>Link PayPal</button>
        <button>Pay with Credit Card</button>
      </div>

      <!-- Exclusive content link -->
      <p>
        <a href="premium.html" id="learnMore">Unlock exclusive content and advanced recommendations.</a>
      </p>

      <button type="submit">Sign Up</button>
    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
